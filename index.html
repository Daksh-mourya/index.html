<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sorry ❤️</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #ff758c, #ff7eb3);
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
    }

    .container {
      text-align: center;
      color: #fff;
      padding: 20px;
    }

    a {
      font-size: 26px;
      color: #fff;
      text-decoration: none;
      background: rgba(255,255,255,0.25);
      padding: 14px 32px;
      border-radius: 40px;
      backdrop-filter: blur(6px);
      transition: transform 0.3s, background 0.3s;
    }

    a:hover {
      transform: scale(1.1);
      background: rgba(255,255,255,0.4);
    }

    h1 {
      display: none;
      font-size: 90px;
      margin: 25px 0 10px;
      text-shadow: 0 0 25px rgba(255,255,255,0.9);
      animation: heartbeat 1.5s infinite;
    }

    p {
      display: none;
      font-size: 22px;
      line-height: 1.6;
      opacity: 0.95;
    }

    button {
      display: none;
      margin-top: 25px;
      padding: 12px 28px;
      font-size: 20px;
      border: none;
      border-radius: 30px;
      background: #fff;
      color: #ff4f7b;
      cursor: pointer;
      transition: transform 0.3s;
    }

    button:hover {
      transform: scale(1.1);
    }

    @keyframes heartbeat {
      0% { transform: scale(1); }
      25% { transform: scale(1.1); }
      50% { transform: scale(1); }
      75% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }

    .hearts {
      position: absolute;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .heart {
      position: absolute;
      font-size: 24px;
      animation: float 6s linear infinite;
      opacity: 0.8;
    }

    @keyframes float {
      0% { transform: translateY(100vh); opacity: 0; }
      20% { opacity: 1; }
      100% { transform: translateY(-10vh); opacity: 0; }
    }
  </style>
</head>

<body>

  <div class="container">
    <a href="#" onclick="showSorry()">Tap here 💔</a>

    <h1 id="sorry">SORRY ❤️</h1>

    <p id="text">
      I know I made a mistake…<br>
      But my heart never meant to hurt you 🌹<br>
      You mean more to me than words can ever say.
    </p>

    <button id="forgive" onclick="forgiven()">
      Forgive me? 🥺
    </button>
  </div>

  <div class="hearts" id="hearts"></div>

  <audio id="music" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
  </audio>

  <script>
    function showSorry() {
      document.getElementById("sorry").style.display = "block";
      document.getElementById("text").style.display = "block";
      document.getElementById("forgive").style.display = "inline-block";
      document.getElementById("music").play();
      createHearts();
    }

    function forgiven() {
      alert("Thank you ❤️ You just made my heart smile 😊");
    }

    function createHearts() {
      const hearts = document.getElementById("hearts");
      setInterval(() => {
        const heart = document.createElement("div");
        heart.className = "heart";
        heart.innerHTML = "❤️";
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.animationDuration = (4 + Math.random() * 3) + "s";
        hearts.appendChild(heart);
        setTimeout(() => heart.remove(), 7000);
      }, 300);
    }
  </script>

</body>
</html>
